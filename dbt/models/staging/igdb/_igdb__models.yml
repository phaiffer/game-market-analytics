version: 2

models:
  - name: stg_igdb__games
    description: "Source-shaped staging model for IGDB game reference rows from staged Parquet."
    columns:
      - name: source_system
        description: "Source system identifier."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["igdb"]
      - name: igdb_game_id
        description: "IGDB game identifier."
        tests:
          - not_null
      - name: game_name
        description: "Game name as provided by IGDB."
      - name: slug
        description: "IGDB game slug."
      - name: first_release_date
        description: "IGDB first release timestamp when available."
      - name: aggregated_rating
        description: "Aggregated IGDB rating when available."
      - name: aggregated_rating_count
        description: "Count behind the aggregated IGDB rating when available."
      - name: category
        description: "IGDB game category value when available."
      - name: input_title
        description: "Curated title supplied to the raw ingestion flow."
        tests:
          - not_null
      - name: title_slug
        description: "Normalized title slug used for raw and staged partitions."
        tests:
          - not_null
      - name: selected_igdb_game_id
        description: "IGDB game selected by the raw ingestion flow."
      - name: extract_date
        description: "Raw extract date partition."
        tests:
          - not_null
      - name: run_timestamp
        description: "Raw ingestion run timestamp."
        tests:
          - not_null
      - name: raw_file_path
        description: "Path to the raw JSON payload used to create the staged row."
        tests:
          - not_null
      - name: ingestion_status
        description: "Status recorded by the raw ingestion flow."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["success"]
      - name: staging_status
        description: "Status recorded by the stage normalization flow."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["success"]
      - name: is_valid_game_reference
        description: "True when the row has the minimum fields needed for title-level IGDB mapping."
        tests:
          - not_null

