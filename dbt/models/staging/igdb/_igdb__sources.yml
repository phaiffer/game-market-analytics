            description: "IGDB involved company relationship identifier."
          - name: igdb_game_id
            description: "IGDB game identifier."
          - name: company_id
            description: "IGDB company identifier."
          - name: developer_flag
            description: "Whether the company is marked as a developer."
          - name: publisher_flag
            description: "Whether the company is marked as a publisher."
          - name: supporting_flag
            description: "Whether the company is marked as supporting."
          - name: porting_flag
            description: "Whether the company is marked as porting."
          - name: input_title
            description: "Curated title supplied to the raw ingestion flow."
          - name: title_slug
            description: "Normalized title slug used for raw and staged partitions."
          - name: selected_igdb_game_id
            description: "IGDB game selected by the raw ingestion flow."
          - name: extract_date
